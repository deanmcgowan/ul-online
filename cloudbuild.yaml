steps:
  # ── Fetch build-time secrets ────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud secrets versions access latest --secret=VITE_GOOGLE_STREETVIEW_KEY > /workspace/.streetview_key

  # ── Build & push container ──────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker build \
          --build-arg VITE_GOOGLE_STREETVIEW_KEY="$(cat /workspace/.streetview_key)" \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_TAG} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest \
          .

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}"

  # ── Deploy to Cloud Run ─────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}-${_ENV}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_TAG}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "${_MIN_INSTANCES}"
      - "--max-instances"
      - "${_MAX_INSTANCES}"
      - "--set-secrets"
      - "TRAFIKLAB_SWEDEN3_RT_KEY=TRAFIKLAB_SWEDEN3_RT_KEY:latest,TRAFIKLAB_SWEDEN3_STATIC_KEY=TRAFIKLAB_SWEDEN3_STATIC_KEY:latest,TRAFIKVERKET_OPEN_DATA_API_KEY=TRAFIKVERKET_OPEN_DATA_API_KEY:latest,RESROBOT_API_KEY=RESROBOT_API_KEY:latest,VAPID_PUBLIC_KEY=VAPID_PUBLIC_KEY:latest,VAPID_PRIVATE_KEY=VAPID_PRIVATE_KEY:latest"
      - "--execution-environment"
      - "gen2"
      - "--set-env-vars"
      - "NODE_ENV=production,DB_PATH=/app/data/gtfs.db"

substitutions:
  _REGION: europe-north1
  _REPO: ul-online
  _SERVICE: ul-online
  _ENV: stage
  _TAG: latest
  _MIN_INSTANCES: "1"
  _MAX_INSTANCES: "2"

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}"
