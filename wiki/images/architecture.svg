<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="Inter, Segoe UI, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowblue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">UL Online — Architecture Overview</text>

  <!-- ── EXTERNAL DATA SOURCES ── -->
  <rect x="20" y="60" width="180" height="120" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="110" y="82" text-anchor="middle" font-weight="600" fill="#92400e">External Data</text>

  <rect x="34" y="92" width="152" height="28" rx="5" fill="#fde68a" stroke="#d97706"/>
  <text x="110" y="111" text-anchor="middle" fill="#78350f">Trafiklab GTFS Static</text>

  <rect x="34" y="128" width="152" height="28" rx="5" fill="#fde68a" stroke="#d97706"/>
  <text x="110" y="147" text-anchor="middle" fill="#78350f">Trafiklab GTFS-RT</text>

  <!-- ── SUPABASE BACKEND ── -->
  <rect x="300" y="60" width="260" height="260" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="430" y="82" text-anchor="middle" font-weight="600" fill="#1d4ed8">Supabase Backend</text>

  <!-- Edge Functions box -->
  <rect x="316" y="94" width="228" height="100" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="430" y="113" text-anchor="middle" font-weight="600" font-size="12" fill="#1e40af">Edge Functions</text>
  <rect x="326" y="122" width="98" height="28" rx="4" fill="#bfdbfe"/>
  <text x="375" y="141" text-anchor="middle" font-size="11" fill="#1e3a8a">trafiklab-import</text>
  <rect x="434" y="122" width="100" height="28" rx="4" fill="#bfdbfe"/>
  <text x="484" y="141" text-anchor="middle" font-size="11" fill="#1e3a8a">trafiklab-vehicles</text>
  <text x="430" y="180" text-anchor="middle" font-size="11" fill="#3b82f6">+ service-alerts, trip-updates</text>

  <!-- Database box -->
  <rect x="316" y="206" width="228" height="100" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="430" y="224" text-anchor="middle" font-weight="600" font-size="12" fill="#1e40af">PostgreSQL Database</text>
  <rect x="326" y="234" width="98" height="24" rx="4" fill="#bfdbfe"/>
  <text x="375" y="251" text-anchor="middle" font-size="11" fill="#1e3a8a">transit_stops</text>
  <rect x="434" y="234" width="100" height="24" rx="4" fill="#bfdbfe"/>
  <text x="484" y="251" text-anchor="middle" font-size="11" fill="#1e3a8a">transit_routes</text>
  <rect x="326" y="266" width="98" height="24" rx="4" fill="#bfdbfe"/>
  <text x="375" y="283" text-anchor="middle" font-size="11" fill="#1e3a8a">transit_trips</text>
  <rect x="434" y="266" width="100" height="24" rx="4" fill="#bfdbfe"/>
  <text x="484" y="283" text-anchor="middle" font-size="11" fill="#1e3a8a">stop_routes</text>

  <!-- ── FRONTEND ── -->
  <rect x="620" y="60" width="220" height="380" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="730" y="82" text-anchor="middle" font-weight="600" fill="#15803d">React Frontend</text>

  <rect x="634" y="94" width="192" height="44" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <text x="730" y="115" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">BusMap (OpenLayers)</text>
  <text x="730" y="130" text-anchor="middle" font-size="11" fill="#166534">Live map + stop/vehicle layers</text>

  <rect x="634" y="148" width="192" height="44" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <text x="730" y="169" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">StopPopup</text>
  <text x="730" y="184" text-anchor="middle" font-size="11" fill="#166534">Arrivals, favourites, filtering</text>

  <rect x="634" y="202" width="192" height="44" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <text x="730" y="223" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">BusPopup</text>
  <text x="730" y="238" text-anchor="middle" font-size="11" fill="#166534">Speed, heading, next stops</text>

  <rect x="634" y="256" width="192" height="44" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <text x="730" y="277" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">CommuteDashboard</text>
  <text x="730" y="292" text-anchor="middle" font-size="11" fill="#166534">Journey planning cards</text>

  <rect x="634" y="310" width="192" height="44" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <text x="730" y="331" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Settings page</text>
  <text x="730" y="346" text-anchor="middle" font-size="11" fill="#166534">Speed, zoom, language prefs</text>

  <rect x="634" y="364" width="192" height="44" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <text x="730" y="385" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Hooks layer</text>
  <text x="730" y="400" text-anchor="middle" font-size="11" fill="#166534">useStaticData, useTripUpdates…</text>

  <!-- ── ResRobot ── -->
  <rect x="300" y="360" width="260" height="60" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="430" y="382" text-anchor="middle" font-weight="600" fill="#7e22ce">ResRobot Journey Planner</text>
  <text x="430" y="400" text-anchor="middle" font-size="11" fill="#7e22ce">Trip planning API (via Trafiklab)</text>

  <!-- ── BROWSER / USER ── -->
  <rect x="620" y="460" width="220" height="44" rx="8" fill="#fafafa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="730" y="481" text-anchor="middle" font-weight="600" fill="#475569">Browser / Mobile PWA</text>
  <text x="730" y="496" text-anchor="middle" font-size="11" fill="#475569">Geolocation · localStorage · SW</text>

  <!-- ── ARROWS ── -->
  <!-- Trafiklab Static → trafiklab-import -->
  <line x1="200" y1="106" x2="314" y2="133" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <!-- Trafiklab RT → trafiklab-vehicles -->
  <line x1="200" y1="142" x2="314" y2="151" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- trafiklab-import → DB -->
  <line x1="430" y1="196" x2="430" y2="204" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowblue)"/>

  <!-- Edge Functions ↔ Frontend -->
  <line x1="546" y1="120" x2="618" y2="120" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowblue)"/>
  <line x1="618" y1="108" x2="548" y2="108" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DB → Frontend -->
  <line x1="546" y1="256" x2="618" y2="256" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowblue)"/>

  <!-- ResRobot ↔ Frontend CommuteDashboard -->
  <line x1="562" y1="385" x2="632" y2="385" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="632" y1="375" x2="562" y2="375" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Frontend → Browser -->
  <line x1="730" y1="456" x2="730" y2="460" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="20" y="440" width="260" height="64" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="30" y="458" font-size="11" font-weight="600" fill="#475569">Legend</text>
  <line x1="30" y1="472" x2="60" y2="472" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="68" y="476" font-size="11" fill="#475569">External data pull (scheduled)</text>
  <line x1="30" y1="490" x2="60" y2="490" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="68" y="494" font-size="11" fill="#475569">Supabase data fetch</text>
</svg>
