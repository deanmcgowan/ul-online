<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Inter, Segoe UI, sans-serif" font-size="12">
  <rect width="700" height="360" fill="#f8fafc" rx="10"/>
  <text x="350" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">GTFS Data Model</text>

  <!-- transit_stops -->
  <rect x="20" y="50" width="160" height="130" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="20" y="50" width="160" height="24" rx="6" fill="#3b82f6"/>
  <text x="100" y="67" text-anchor="middle" fill="white" font-weight="600">transit_stops</text>
  <text x="34" y="92" fill="#1e40af">stop_id (PK)</text>
  <text x="34" y="110" fill="#1e40af">stop_name</text>
  <text x="34" y="128" fill="#1e40af">stop_lat</text>
  <text x="34" y="146" fill="#1e40af">stop_lon</text>
  <text x="34" y="164" fill="#1e40af">platform_code</text>

  <!-- transit_routes -->
  <rect x="220" y="50" width="160" height="110" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="220" y="50" width="160" height="24" rx="6" fill="#22c55e"/>
  <text x="300" y="67" text-anchor="middle" fill="white" font-weight="600">transit_routes</text>
  <text x="234" y="92" fill="#166534">route_id (PK)</text>
  <text x="234" y="110" fill="#166534">route_short_name</text>
  <text x="234" y="128" fill="#166534">route_long_name</text>
  <text x="234" y="146" fill="#166534">route_type</text>

  <!-- transit_trips -->
  <rect x="420" y="50" width="160" height="110" rx="6" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="420" y="50" width="160" height="24" rx="6" fill="#a855f7"/>
  <text x="500" y="67" text-anchor="middle" fill="white" font-weight="600">transit_trips</text>
  <text x="434" y="92" fill="#7e22ce">trip_id (PK)</text>
  <text x="434" y="110" fill="#7e22ce">route_id (FK)</text>
  <text x="434" y="128" fill="#7e22ce">trip_headsign</text>
  <text x="434" y="146" fill="#7e22ce">service_id</text>

  <!-- stop_routes -->
  <rect x="20" y="220" width="160" height="110" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <rect x="20" y="220" width="160" height="24" rx="6" fill="#f97316"/>
  <text x="100" y="237" text-anchor="middle" fill="white" font-weight="600">stop_routes</text>
  <text x="34" y="262" fill="#9a3412">stop_id (FK)</text>
  <text x="34" y="280" fill="#9a3412">route_id (FK)</text>
  <text x="34" y="298" fill="#9a3412">trip_id (FK)</text>
  <text x="34" y="316" fill="#9a3412">direction_id</text>

  <!-- stop_times (partial) -->
  <rect x="220" y="220" width="160" height="110" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <rect x="220" y="220" width="160" height="24" rx="6" fill="#eab308"/>
  <text x="300" y="237" text-anchor="middle" fill="white" font-weight="600">stop_times</text>
  <text x="234" y="262" fill="#713f12">trip_id (FK)</text>
  <text x="234" y="280" fill="#713f12">stop_id (FK)</text>
  <text x="234" y="298" fill="#713f12">stop_sequence</text>
  <text x="234" y="316" fill="#713f12">arrival_time</text>

  <!-- GTFS-RT note -->
  <rect x="420" y="220" width="240" height="90" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="420" y="220" width="240" height="24" rx="6" fill="#ef4444"/>
  <text x="540" y="237" text-anchor="middle" fill="white" font-weight="600">GTFS-RT (realtime, not stored)</text>
  <text x="434" y="262" fill="#7f1d1d">VehiclePosition: id, lat, lon,</text>
  <text x="434" y="280" fill="#7f1d1d">bearing, speed, trip_id</text>
  <text x="434" y="298" fill="#7f1d1d">TripUpdate: delays, stop ETAs</text>

  <!-- FK lines -->
  <defs>
    <marker id="fk" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <line x1="100" y1="180" x2="100" y2="218" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#fk)"/>
  <line x1="180" y1="130" x2="218" y2="130" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#fk)"/>
  <line x1="380" y1="130" x2="418" y2="130" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#fk)"/>
  <line x1="300" y1="160" x2="300" y2="218" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#fk)"/>
  <line x1="180" y1="290" x2="218" y2="290" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#fk)"/>
</svg>
