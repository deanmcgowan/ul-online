<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Inter, Segoe UI, sans-serif" font-size="12">
  <rect width="600" height="400" fill="#f8fafc" rx="10"/>
  <text x="300" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Reach Circle — How it Works</text>

  <!-- Map background -->
  <rect x="30" y="45" width="540" height="320" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>

  <!-- Streets (simplified) -->
  <line x1="300" y1="45" x2="300" y2="365" stroke="#bae6fd" stroke-width="3"/>
  <line x1="30" y1="205" x2="570" y2="205" stroke="#bae6fd" stroke-width="3"/>
  <line x1="120" y1="45" x2="80" y2="365" stroke="#bae6fd" stroke-width="2"/>
  <line x1="480" y1="45" x2="520" y2="365" stroke="#bae6fd" stroke-width="2"/>
  <line x1="30" y1="120" x2="570" y2="100" stroke="#bae6fd" stroke-width="2"/>
  <line x1="30" y1="300" x2="570" y2="310" stroke="#bae6fd" stroke-width="2"/>

  <!-- Reach circle -->
  <circle cx="300" cy="220" r="120" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Smaller inner circle -->
  <circle cx="300" cy="220" r="70" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- User location pin -->
  <circle cx="300" cy="220" r="10" fill="#1d4ed8" stroke="white" stroke-width="2"/>
  <circle cx="300" cy="220" r="4" fill="white"/>
  <text x="318" y="218" fill="#1d4ed8" font-weight="600" font-size="11">You</text>

  <!-- Bus stops -->
  <!-- Stop 1 (within inner circle) -->
  <circle cx="360" cy="175" r="8" fill="#f97316" stroke="white" stroke-width="1.5"/>
  <text x="372" y="172" fill="#9a3412" font-size="10" font-weight="600">Stop A</text>
  <text x="372" y="183" fill="#9a3412" font-size="10">~58m • bus 1, 2</text>

  <!-- Stop 2 (between circles) -->
  <circle cx="230" cy="290" r="8" fill="#f97316" stroke="white" stroke-width="1.5"/>
  <text x="245" y="287" fill="#9a3412" font-size="10" font-weight="600">Stop B</text>
  <text x="245" y="298" fill="#9a3412" font-size="10">~94m • bus 3</text>

  <!-- Stop 3 (within outer only) -->
  <circle cx="390" cy="285" r="8" fill="#f97316" stroke="white" stroke-width="1.5"/>
  <text x="402" y="282" fill="#9a3412" font-size="10" font-weight="600">Stop C</text>
  <text x="402" y="293" fill="#9a3412" font-size="10">~115m</text>

  <!-- Stop 4 (outside) -->
  <circle cx="150" cy="100" r="8" fill="#94a3b8" stroke="white" stroke-width="1.5"/>
  <text x="162" y="97" fill="#475569" font-size="10" font-weight="600">Stop D</text>
  <text x="162" y="108" fill="#475569" font-size="10">out of range</text>

  <!-- Walk lines from user to reachable stops -->
  <line x1="300" y1="220" x2="360" y2="175" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="300" y1="220" x2="230" y2="290" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="300" y1="220" x2="390" y2="285" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="38" y="52" width="170" height="80" rx="5" fill="white" fill-opacity="0.9" stroke="#e2e8f0"/>
  <circle cx="58" cy="75" r="7" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-dasharray="3,2"/>
  <text x="72" y="79" font-size="10" fill="#1e40af">Inner: buffer × walk speed</text>
  <circle cx="58" cy="98" r="7" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-dasharray="4,3"/>
  <text x="72" y="102" font-size="10" fill="#166534">Outer: max walk distance</text>
  <circle cx="58" cy="120" r="6" fill="#f97316" stroke="white" stroke-width="1.5"/>
  <text x="72" y="124" font-size="10" fill="#9a3412">Bus stop (in range)</text>
</svg>
